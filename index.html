<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marmite Bleue V8</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🍲 Marmite Dashboard</h1>

<div class="card" id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Connexion</button>
</div>

<div id="app" style="display:none;">

<div class="card highlight">
<h2 id="score"></h2>
<p id="resume"></p>
</div>

<div class="card">
<input id="clients" type="number" placeholder="Clients">
<input id="avis" type="number" placeholder="Avis">
<input id="note" type="number" step="0.1" placeholder="Note">
<input id="attente" type="number" placeholder="Attente">
<input id="employe" placeholder="Employé">

<button onclick="analyser()">Analyser journée</button>
<button onclick="logout()">Déconnexion</button>
</div>

<div class="card">
<h3>🚨 Alertes</h3>
<div id="alertes"></div>
</div>

<div class="card">
<h3>🧠 Actions recommandées</h3>
<div id="actions"></div>
</div>

<div class="card">
<h3>📊 Performance</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
